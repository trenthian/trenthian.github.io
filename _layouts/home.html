<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>{{ page.title }}</title>

  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>

<body>

<!-- =========================
     NAV BAR
========================= -->
<div class="nav">
  <a href="#top">Home</a>
  <a href="#about">About</a>
  <a href="#projects">Projects</a>
  <a href="#contact">Contact</a>

  <!-- Theme Toggle -->
  <button id="themeToggle" style="
    margin-left: 12px;
    background: none;
    border: 1px solid var(--border);
    color: var(--accent);
    padding: 6px 10px;
    border-radius: 8px;
    cursor: pointer;
  ">
    🌙 Theme
  </button>
</div>

<!-- =========================
     MAIN CONTENT
========================= -->
<main class="container" id="top">
  {{ content }}
</main>

<!-- =========================
     AUDIO (UI SOUND)
========================= -->
<audio id="uiSound" preload="auto">
  <source src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" type="audio/mpeg">
</audio>

<!-- =========================
     SCRIPTS
========================= -->
<script>

/* =========================
   THEME TOGGLE (SAVE + LOAD)
========================= */
const themeBtn = document.getElementById("themeToggle");

themeBtn?.addEventListener("click", () => {
  document.body.classList.toggle("slate");

  localStorage.setItem(
    "theme",
    document.body.classList.contains("slate") ? "slate" : "dark"
  );
});

// restore theme
if (localStorage.getItem("theme") === "slate") {
  document.body.classList.add("slate");
}

/* =========================
   HOVER GLOW SYSTEM
========================= */
document.querySelectorAll('.card').forEach(card => {
  card.addEventListener('mousemove', e => {
    const rect = card.getBoundingClientRect();
    card.style.setProperty('--x', `${e.clientX - rect.left}px`);
    card.style.setProperty('--y', `${e.clientY - rect.top}px`);
  });
});

/* =========================
   SOUND SYSTEM (THROTTLED)
========================= */
const sound = document.getElementById("uiSound");
let lastPlay = 0;

document.querySelectorAll(".card").forEach(card => {
  card.addEventListener("mouseenter", () => {
    const now = Date.now();
    if (now - lastPlay > 120) {
      sound.currentTime = 0;
      sound.volume = 0.25;
      sound.play();
      lastPlay = now;
    }
  });
});

/* =========================
   VIDEO SYSTEM (THUMBNAILS + SWITCHING)
========================= */
const iframe = document.getElementById("mainVideo");
const items = document.querySelectorAll(".video-item");

function setActive(el) {
  items.forEach(i => i.classList.remove("active"));
  el.classList.add("active");
}

items.forEach(item => {

  const id = item.getAttribute("data-video");

  /* build thumbnail */
  const img = document.createElement("img");
  img.src = `https://img.youtube.com/vi/${id}/hqdefault.jpg`;
  item.appendChild(img);

  /* click to switch video */
  item.addEventListener("click", () => {
    if (iframe) {
      iframe.src = `https://www.youtube.com/embed/${id}`;
    }

    setActive(item);

    /* click sound */
    if (sound) {
      sound.currentTime = 0;
      sound.volume = 0.25;
      sound.play();
    }
  });
});

</script>

</body>
</html>
