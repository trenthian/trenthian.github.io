<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}</title>

  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>

<body>

<!-- NAV -->
<div class="nav">
  <a href="#top">Home</a>
  <a href="#about">About</a>
  <a href="#contact">Contact</a>

  <button id="themeToggle"
    style="margin-left:12px;padding:6px 10px;border-radius:8px;border:1px solid var(--border);background:none;color:var(--accent);cursor:pointer;">
    🌙 Theme
  </button>
</div>

<main class="container" id="top">
  {{ content }}
</main>

<!-- AUDIO -->
<audio id="uiSound" preload="auto">
  <source src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3">
</audio>

<script>

/* =========================
   THEME TOGGLE
========================= */

const themeBtn = document.getElementById("themeToggle");

themeBtn?.addEventListener("click", () => {
  document.body.classList.toggle("slate");
});

/* =========================
   HOVER GLOW
========================= */

document.querySelectorAll(".card").forEach(card => {
  card.addEventListener("mousemove", e => {
    const r = card.getBoundingClientRect();
    card.style.setProperty("--x", `${e.clientX - r.left}px`);
    card.style.setProperty("--y", `${e.clientY - r.top}px`);
  });
});

/* =========================
   SOUND
========================= */

const sound = document.getElementById("uiSound");
let last = 0;

document.querySelectorAll(".card").forEach(card => {
  card.addEventListener("mouseenter", () => {
    const now = Date.now();
    if (sound && now - last > 120) {
      sound.currentTime = 0;
      sound.volume = 0.25;
      sound.play();
      last = now;
    }
  });
});

/* =========================
   VIDEO SYSTEM
========================= */

const PLAYLIST_ID = "PLYIsLLpWMRZU";
const playlistEl = document.getElementById("videoPlaylist");
const iframe = document.getElementById("mainVideo");

const feed = `https://www.youtube.com/feeds/videos.xml?playlist_id=${PLAYLIST_ID}`;

fetch(feed)
  .then(r => r.text())
  .then(str => {
    const xml = new DOMParser().parseFromString(str, "text/xml");
    const entries = xml.querySelectorAll("entry");

    let first = null;

    entries.forEach(entry => {
      const videoId = entry.querySelector("yt\\:videoId")?.textContent;
      if (!videoId) return;

      if (!first) first = videoId;

      const item = document.createElement("div");
      item.className = "video-item";

      item.innerHTML = `
        <img src="https://img.youtube.com/vi/${videoId}/hqdefault.jpg">
      `;

      item.addEventListener("click", () => {
        iframe.src = `https://www.youtube.com/embed/${videoId}`;

        document.querySelectorAll(".video-item")
          .forEach(i => i.classList.remove("active"));

        item.classList.add("active");

        if (sound) {
          sound.currentTime = 0;
          sound.volume = 0.25;
          sound.play();
        }
      });

      playlistEl.appendChild(item);
    });

    if (first) {
      iframe.src = `https://www.youtube.com/embed/${first}`;
      playlistEl.firstChild?.classList.add("active");
    }
  });

</script>

</body>
</html>
