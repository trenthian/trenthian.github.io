<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>{{ page.title }}</title>

  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>

<body>

<!-- =========================
   NAV
========================= -->
<div class="nav">
  <a href="#top">Home</a>
  <a href="#about">About</a>
  <a href="#projects">Projects</a>
  <a href="#contact">Contact</a>

  <button id="themeToggle" style="
    margin-left: 12px;
    background: none;
    border: 1px solid var(--border);
    color: var(--accent);
    padding: 6px 10px;
    border-radius: 8px;
    cursor: pointer;
  ">
    🌙 Theme
  </button>
</div>

<!-- =========================
   CONTENT
========================= -->
<main class="container" id="top">
  {{ content }}
</main>

<!-- =========================
   AUDIO
========================= -->
<audio id="uiSound" preload="auto">
  <source src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3">
</audio>

<!-- =========================
   SCRIPT SYSTEM
========================= -->
<script>

/* =========================
   THEME TOGGLE
========================= */
const themeBtn = document.getElementById("themeToggle");

themeBtn?.addEventListener("click", () => {
  document.body.classList.toggle("slate");

  localStorage.setItem(
    "theme",
    document.body.classList.contains("slate") ? "slate" : "dark"
  );
});

if (localStorage.getItem("theme") === "slate") {
  document.body.classList.add("slate");
}

/* =========================
   HOVER GLOW
========================= */
document.querySelectorAll(".card").forEach(card => {
  card.addEventListener("mousemove", e => {
    const r = card.getBoundingClientRect();
    card.style.setProperty("--x", `${e.clientX - r.left}px`);
    card.style.setProperty("--y", `${e.clientY - r.top}px`);
  });
});

/* =========================
   SOUND
========================= */
const sound = document.getElementById("uiSound");
let last = 0;

document.querySelectorAll(".card").forEach(card => {
  card.addEventListener("mouseenter", () => {
    const now = Date.now();
    if (now - last > 120) {
      sound.currentTime = 0;
      sound.volume = 0.25;
      sound.play();
      last = now;
    }
  });
});

/* =========================
   VIDEO SYSTEM
========================= */

const iframe = document.getElementById("mainVideo");
const items = document.querySelectorAll(".video-item");

function setActive(el) {
  items.forEach(i => i.classList.remove("active"));
  el.classList.add("active");
}

items.forEach(item => {
  const id = item.dataset.video;

  const img = document.createElement("img");
  img.src = `https://img.youtube.com/vi/${id}/hqdefault.jpg`;
  item.appendChild(img);

  item.addEventListener("click", () => {
    iframe.src = `https://www.youtube.com/embed/${id}`;

    setActive(item);

    const now = Date.now();
    if (sound && now - last > 120) {
      sound.currentTime = 0;
      sound.volume = 0.25;
      sound.play();
      last = now;
    }
  });
});

</script>

</body>
</html>
