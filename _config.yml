theme: jekyll-theme-minimal
title: Stoat's homepage
description: Bookmark this to keep an eye on my project updates!
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Name</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:#0d1117;
    color:#e6edf3;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow-x:hidden;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at top left,#2563eb33,transparent 40%),
        radial-gradient(circle at bottom right,#7c3aed22,transparent 40%);
    z-index:-1;
}

.container{
    width:min(900px,92%);
    background:rgba(22,27,34,.65);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.06);
    border-radius:22px;
    padding:60px;
    box-shadow:0 20px 60px rgba(0,0,0,.45);
    animation:fadeIn .8s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(25px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

h1{
    font-size:3rem;
    font-weight:700;
    margin-bottom:12px;
}

.highlight{
    color:#58a6ff;
}

.subtitle{
    color:#8b949e;
    font-size:1.1rem;
    margin-bottom:35px;
    line-height:1.7;
}

.buttons{
    display:flex;
    flex-wrap:wrap;
    gap:16px;
}

.button{
    text-decoration:none;
    color:white;
    background:#2388ff;
    padding:14px 26px;
    border-radius:12px;
    transition:.25s;
    font-weight:600;
}

.button:hover{
    transform:translateY(-3px);
    background:#4da3ff;
    box-shadow:0 8px 25px rgba(35,136,255,.35);
}

.button.secondary{
    background:transparent;
    border:1px solid #30363d;
}

.button.secondary:hover{
    background:#21262d;
}

.cards{
    margin-top:50px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.card{
    background:#161b22;
    border:1px solid #30363d;
    padding:22px;
    border-radius:16px;
    transition:.25s;
}

.card:hover{
    transform:translateY(-6px);
    border-color:#58a6ff;
}

.card h3{
    margin-bottom:10px;
}

.card p{
    color:#8b949e;
    line-height:1.6;
}

footer{
    margin-top:50px;
    color:#6e7681;
    text-align:center;
    font-size:.9rem;
}

@media(max-width:700px){

.container{
    padding:35px;
}

h1{
    font-size:2.3rem;
}

}
</style>
</head>

<body>

<div class="container">

<h1>Hello, I'm <span class="highlight">Your Name</span>.</h1>

<p class="subtitle">
Welcome to my corner of the internet.
I build cool things, write code, and create projects I'm passionate about.
</p>

<div class="buttons">
<a href="#" class="button">Projects</a>
<a href="#" class="button secondary">GitHub</a>
<a href="#" class="button secondary">Contact</a>
</div>

<div class="cards">

<div class="card">
<h3>Projects</h3>
<p>Explore my latest work, experiments, and open source repositories.</p>
</div>

<div class="card">
<h3>About Me</h3>
<p>Learn more about my background, interests, and technical skills.</p>
</div>

<div class="card">
<h3>Blog</h3>
<p>Thoughts, tutorials, and notes from things I've learned.</p>
</div>

</div>

<footer>
© 2026 Your Name
</footer>

</div>

</body>
</html>
